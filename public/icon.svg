<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161412"/>
      <stop offset="100%" stop-color="#0C0B09"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4AD6A"/>
      <stop offset="100%" stop-color="#8B6D3F"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#g1)"/>
  <!-- Outer glow -->
  <circle cx="256" cy="230" r="120" fill="#B8956A" opacity="0.04"/>
  <!-- Lotus petals -->
  <g transform="translate(256,230)">
    <!-- Back petals -->
    <path d="M0,-95 C-25,-75 -35,-30 -20,5 C-5,-25 5,-25 20,5 C35,-30 25,-75 0,-95Z" fill="url(#g2)" opacity="0.3" transform="rotate(-45)"/>
    <path d="M0,-95 C-25,-75 -35,-30 -20,5 C-5,-25 5,-25 20,5 C35,-30 25,-75 0,-95Z" fill="url(#g2)" opacity="0.3" transform="rotate(45)"/>
    <!-- Mid petals -->
    <path d="M0,-100 C-22,-78 -30,-35 -18,0 C-4,-28 4,-28 18,0 C30,-35 22,-78 0,-100Z" fill="url(#g2)" opacity="0.5" transform="rotate(-25)"/>
    <path d="M0,-100 C-22,-78 -30,-35 -18,0 C-4,-28 4,-28 18,0 C30,-35 22,-78 0,-100Z" fill="url(#g2)" opacity="0.5" transform="rotate(25)"/>
    <!-- Front petal -->
    <path d="M0,-105 C-20,-80 -28,-38 -16,2 C-3,-30 3,-30 16,2 C28,-38 20,-80 0,-105Z" fill="url(#g2)" opacity="0.85"/>
    <!-- Center -->
    <circle cx="0" cy="0" r="10" fill="#D4AD6A"/>
    <!-- Base curve -->
    <path d="M-50,15 Q-25,35 0,25 Q25,35 50,15" fill="none" stroke="#B8956A" stroke-width="2.5" opacity="0.4"/>
  </g>
  <!-- Text -->
  <text x="256" y="395" text-anchor="middle" fill="#B8956A" font-family="Georgia,serif" font-size="48" letter-spacing="3" opacity="0.9">prakruti</text>
  <text x="256" y="425" text-anchor="middle" fill="#B8956A" font-family="Arial,sans-serif" font-size="14" letter-spacing="6" opacity="0.4">AYURVEDIC WELLNESS</text>
</svg>
